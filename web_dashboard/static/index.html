<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化交易看板</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --orange: #d29922;
    --accent: #1f6feb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: var(--bg); color: var(--text); padding: 20px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .time { color: var(--muted); font-size: 14px; }
  .grid { display: grid; gap: 16px; margin-bottom: 24px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .card-header {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .card-value {
    font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .blue { color: var(--blue); }
  .orange { color: var(--orange); }

  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .log-area {
    background: #010409; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; font-size: 12px;
    max-height: 400px; overflow-y: auto; font-family: 'Cascadia Code', monospace;
  }
  .log-line {
    padding: 2px 0; border-bottom: 1px solid rgba(48,54,61,0.3);
    display: flex; gap: 8px;
  }
  .log-time { color: var(--muted); white-space: nowrap; min-width: 80px; }
  .log-msg { white-space: pre-wrap; word-break: break-all; }

  .pos-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pos-table th { text-align: left; padding: 6px 8px; color: var(--muted); font-size: 11px; border-bottom: 1px solid var(--border); }
  .pos-table td { padding: 6px 8px; border-bottom: 1px solid rgba(48,54,61,0.3); }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab {
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    font-size: 13px;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .stat-item {
    text-align: center; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
  }
  .stat-item .label { font-size: 11px; color: var(--muted); }
  .stat-item .val { font-size: 18px; font-weight: 700; margin-top: 4px; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-yellow { background: rgba(210,153,34,0.15); color: var(--orange); }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--orange); }

  @media (max-width: 900px) {
    .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .grid-4, .grid-5, .grid-3 { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📊 量化交易看板</h1>
  <span class="time" id="sysTime">加载中...</span>
</div>

<!-- 顶栏：余额 + 仓位状态 -->
<div class="grid grid-3" id="topCards">
  <div class="card">
    <div class="card-header">💰 保证金余额</div>
    <div class="card-value" id="balance">--</div>
    <div class="card-sub" id="balanceTime"></div>
  </div>
  <div class="card">
    <div class="card-header">📈 当前仓位</div>
    <div class="card-value" id="positionSymbol" style="font-size:18px;">--</div>
    <div class="card-sub" id="positionDetail"></div>
  </div>
  <div class="card">
    <div class="card-header">⚡ 浮盈概况</div>
    <div class="card-value" id="riskStatus" style="font-size:20px;">--</div>
    <div class="card-sub" id="riskDetail"></div>
  </div>
</div>

<!-- 中间统计行 -->
<div class="section-title">📋 交易总览</div>
<div class="grid grid-5" id="overviewCards">
  <div class="card"> <div class="card-header">总交易</div> <div class="card-value" id="totalTrades">--</div> </div>
  <div class="card"> <div class="card-header">胜率</div> <div class="card-value" id="winRate">--</div> <div class="card-sub" id="winLoss"></div> </div>
  <div class="card"> <div class="card-header">总盈亏</div> <div class="card-value" id="totalPnl">--</div> </div>
  <div class="card"> <div class="card-header">多/空比</div> <div class="card-value" id="longShortRatio">--</div> <div class="card-sub" id="longShortDetail"></div> </div>
  <div class="card"> <div class="card-header">多/空盈亏</div> <div class="card-value" id="longShortPnl">--</div> <div class="card-sub" id="longShortPnlDetail"></div> </div>
</div>

<!-- 周期统计 -->
<div class="section-title">⏱ 周期统计</div>
<div class="tabs" id="periodTabs">
  <div class="tab active" data-period="1h">1h</div>
  <div class="tab" data-period="3h">3h</div>
  <div class="tab" data-period="6h">6h</div>
  <div class="tab" data-period="12h">12h</div>
  <div class="tab" data-period="24h">24h</div>
</div>
<div id="periodStats"></div>

<!-- 市场概况 -->
<div class="section-title" style="margin-top: 16px;">📊 市场概况</div>
<div class="card" id="marketCard">
  <div id="marketContent" style="font-size:13px;line-height:1.6;">
    <div style="color:var(--muted)">加载中...</div>
  </div>
</div>

<!-- 仓位详情 -->
<div class="section-title" style="margin-top: 16px;">🔍 仓位列表</div>
<div class="card" id="positionCard">
  <div id="positionTableContainer"></div>
</div>

<!-- 交易明细 -->
<div class="section-title" style="margin-top: 16px;">📋 最近交易 <span style="font-size:12px;color:var(--muted);font-weight:400;">（含滑点）</span></div>
<div class="card" id="tradeCard">
  <div style="max-height:300px;overflow-y:auto;">
    <table class="pos-table"><thead><tr>
      <th>时间</th><th>币种</th><th>方向</th><th>入场</th><th>原因</th><th>盈亏</th><th>手续费</th><th>滑点</th><th>净盈亏</th>
    </tr></thead><tbody id="tradeBody"></tbody></table>
  </div>
</div>

<!-- 资金费率 -->
<div class="section-title" style="margin-top: 16px;">💰 资金费率</div>
<div class="card" id="fundingCard">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:13px;">累计资金费: <span id="totalFunding" style="font-weight:700;">--</span> USDT</span>
  </div>
  <div style="max-height:200px;overflow-y:auto;">
    <table class="pos-table"><thead><tr>
      <th>时间</th><th>币种</th><th>方向</th><th>费率</th><th>支出(USDT)</th>
    </tr></thead><tbody id="fundingBody"></tbody></table>
  </div>
</div>

<!-- 日志 -->
<div class="section-title" style="margin-top: 16px;">📝 运行日志</div>
<div class="tabs" id="logTabs">
  <div class="tab active" data-log="200">最近 200 条</div>
  <div class="tab" data-log="100">最近 100 条</div>
  <div class="tab" data-log="50">最近 50 条</div>
</div>
<div class="log-area" id="logArea"><div style="color:var(--muted)">加载中...</div></div>

<script>
// ==================== 数据加载 ====================
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) {
    return { error: e.message };
  }
}

// 更新时间
function updateTime() {
  const now = new Date();
  document.getElementById('sysTime').textContent =
    now.toLocaleString('zh-CN', { hour12: false });
}

function fmt(num, dec = 2) {
  if (num === null || num === undefined) return '--';
  return Number(num).toFixed(dec);
}

function pnlClass(val) {
  if (!val || val === 0) return '';
  return val > 0 ? 'green' : 'red';
}

function pnlText(val) {
  if (val === null || val === undefined) return '--';
  const n = Number(val);
  const s = n > 0 ? '+' : '';
  return `<span class="${pnlClass(n)}">${s}${fmt(n)}</span>`;
}

// 加载余额
async function loadBalance() {
  const data = await fetchJSON('/api/balance');
  const el = document.getElementById('balance');
  const subEl = document.getElementById('balanceTime');
  if (data.error) {
    el.textContent = '-- USDT';
    el.className = 'card-value orange';
    subEl.textContent = '⚠ ' + data.error;
  } else {
    el.innerHTML = `${fmt(data.wallet)} <span style="font-size:14px;color:var(--muted)">USDT</span>`;
    el.className = 'card-value blue';
    subEl.textContent = `可用: ${fmt(data.available)} USDT`;
  }
}

// 加载仓位
async function loadPosition() {
  const data = await fetchJSON('/api/position');
  const symEl = document.getElementById('positionSymbol');
  const detEl = document.getElementById('positionDetail');
  const riskEl = document.getElementById('riskStatus');
  const riskDet = document.getElementById('riskDetail');
  const container = document.getElementById('positionTableContainer');

  if (data.has_position && data.positions && data.positions.length > 0) {
    const count = data.positions.length;
    symEl.textContent = `${count} 个仓位`;
    symEl.className = 'card-value green';

    // 总浮盈
    let totalUpnl = 0;
    for (const p of data.positions) totalUpnl += Number(p.unrealized_pnl || 0);
    detEl.textContent = `总浮盈: ${totalUpnl > 0 ? '+' : ''}${fmt(totalUpnl)} USDT`;

    riskEl.innerHTML = pnlText(totalUpnl) + ' USDT';
    riskDet.textContent = `${count} 个持仓`;

    // 仓位表格
    let html = '<table class="pos-table"><thead><tr>' +
      '<th>币种</th><th>方向</th><th>数量</th><th>开仓价</th><th>标记价</th>' +
      '<th>浮盈</th><th>最高盈%</th><th>锁仓线%</th></tr></thead><tbody>';

    for (const p of data.positions) {
      const pnl = Number(p.unrealized_pnl || 0);
      const highest = (Number(p.highest_profit_pct || 0) * 100).toFixed(1);
      const floor = (Number(p.profit_floor || 0) * 100).toFixed(1);
      const sideLabel = p.side === 'LONG' ? '🟢 多' : '🔴 空';
      html += `<tr>
        <td><b>${p.symbol}</b></td>
        <td>${sideLabel}</td>
        <td>${fmt(p.amount, 4)}</td>
        <td>${fmt(p.entry_price, 6)}</td>
        <td>${fmt(p.mark_price, 6)}</td>
        <td class="${pnlClass(pnl)}">${pnl > 0 ? '+' : ''}${fmt(pnl)}</td>
        <td>${highest}%</td>
        <td>${floor}%</td>
      </tr>`;
    }

    html += '</tbody></table>';
    container.innerHTML = html;
  } else {
    symEl.textContent = '空仓';
    symEl.className = 'card-value muted';
    detEl.textContent = '当前无持仓';
    riskEl.textContent = '--';
    riskEl.className = 'card-value';
    riskDet.textContent = '';
    container.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">暂无持仓</div>';
  }
}

// 加载总览统计
async function loadOverview() {
  const data = await fetchJSON('/api/summary');
  if (!data.total_trades) return;
  document.getElementById('totalTrades').textContent = data.total_trades;
  document.getElementById('winRate').textContent = data.win_rate + '%';
  document.getElementById('winLoss').textContent = `${data.win}胜 ${data.loss}负`;
  document.getElementById('totalPnl').innerHTML = pnlText(data.total_pnl) + ' USDT';
  document.getElementById('longShortRatio').textContent = data.long_short_ratio;
  document.getElementById('longShortDetail').textContent = `${data.long_count}多 / ${data.short_count}空`;
  document.getElementById('longShortPnl').innerHTML = `${pnlText(data.long_pnl)} / ${pnlText(data.short_pnl)}`;
  document.getElementById('longShortPnlDetail').textContent = '多/空';
}

// 加载周期统计
async function loadPeriodStats(period = '1h') {
  const data = await fetchJSON('/api/stats');
  const el = document.getElementById('periodStats');
  const p = data[period];
  if (!p || p.error) {
    el.innerHTML = '<div style="color:var(--muted)">暂无数据</div>';
    return;
  }
  let html = '<div class="stat-grid">';
  html += `<div class="stat-item"><div class="label">交易数</div><div class="val">${p.total_trades || 0}</div></div>`;
  html += `<div class="stat-item"><div class="label">胜率</div><div class="val ${pnlClass(p.win_rate)}">${fmt(p.win_rate, 1)}%</div></div>`;
  html += `<div class="stat-item"><div class="label">总盈亏</div><div class="val ${pnlClass(p.total_pnl)}">${p.total_pnl > 0 ? '+' : ''}${fmt(p.total_pnl)}</div></div>`;
  html += `<div class="stat-item"><div class="label">做多</div><div class="val green">${p.long_count || 0}次</div></div>`;
  html += `<div class="stat-item"><div class="label">做空</div><div class="val red">${p.short_count || 0}次</div></div>`;
  html += '</div>';

  // 按原因统计
  if (p.by_reason && p.by_reason.length > 0) {
    html += '<div style="margin-top: 12px; font-size: 13px; color: var(--muted);">按原因:</div>';
    html += '<table class="pos-table"><thead><tr><th>原因</th><th>次数</th><th>盈亏</th><th>胜率</th></tr></thead><tbody>';
    for (const r of p.by_reason) {
      html += `<tr><td>${r.label || r.reason}</td><td>${r.count}</td><td class="${pnlClass(r.pnl)}">${r.pnl > 0 ? '+' : ''}${fmt(r.pnl)}</td><td>${r.win_rate}%</td></tr>`;
    }
    html += '</tbody></table>';
  }
  el.innerHTML = html;
}

// 加载日志
async function loadLogs(limit = 200) {
  const data = await fetchJSON(`/api/logs?t=${Date.now()}`);
  const el = document.getElementById('logArea');
  if (!data.logs || data.logs.length === 0) {
    el.innerHTML = '<div style="color:var(--muted)">暂无日志</div>';
    return;
  }
  const logs = data.logs.slice(-limit);
  el.innerHTML = logs.map(l => {
    let cls = '';
    if (l.message.includes('错误') || l.message.includes('异常')) cls = ' style="color:var(--red)"';
    else if (l.message.includes('止损') || l.message.includes('平仓')) cls = ' style="color:var(--orange)"';
    else if (l.message.includes('开仓') || l.message.includes('买入')) cls = ' style="color:var(--green)"';
    return `<div class="log-line"><span class="log-time">${l.time || ''}</span><span class="log-msg"${cls}>${l.message}</span></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// 加载市场概况
async function loadMarketAnalysis() {
  const data = await fetchJSON('/api/market_analysis');
  const el = document.getElementById('marketContent');
  if (!data.available) {
    el.innerHTML = '<div style="color:var(--muted)">暂无市场数据（等待首次30分钟采集）</div>';
    return;
  }
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="color:var(--muted);font-size:12px;">采集于 ${data.time?.slice(11,16) || '--'}</span>
    <span>涨 <span class="green">${data.up_count}</span> / 跌 <span class="red">${data.down_count}</span> / 均 <span class="${data.avg_change > 0 ? 'green' : 'red'}">${data.avg_change > 0 ? '+' : ''}${data.avg_change}%</span></span>
  </div>`;

  // 涨跌榜
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;">';
  html += '<div><div style="color:var(--green);font-weight:600;font-size:12px;margin-bottom:4px;">涨幅前5</div>';
  if (data.top_gainers?.length) {
    for (const g of data.top_gainers) {
      html += `<div style="display:flex;justify-content:space-between;padding:2px 0;"><span>${g.symbol}</span><span class="green">+${g.change}%</span></div>`;
    }
  }
  html += '</div><div><div style="color:var(--red);font-weight:600;font-size:12px;margin-bottom:4px;">跌幅前5</div>';
  if (data.top_losers?.length) {
    for (const l of data.top_losers) {
      html += `<div style="display:flex;justify-content:space-between;padding:2px 0;"><span>${l.symbol}</span><span class="red">${l.change}%</span></div>`;
    }
  }
  html += '</div></div>';

  // 概况描述
  if (data.summary) {
    html += `<div style="background:#010409;border-radius:4px;padding:8px;margin-bottom:6px;font-size:12px;color:var(--muted);">${data.summary}</div>`;
  }

  // AI分析
  if (data.ai_analysis && data.ai_analysis.sentiment) {
    const sentimentMap = { '看多': '🟢', '看空': '🔴', '震荡': '🟡' };
    const dot = sentimentMap[data.ai_analysis.sentiment] || '⚪';
    html += `<div style="background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.2);border-radius:6px;padding:10px;">`;
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span>${dot}</span><span style="font-weight:600;">AI 市场分析</span>
      <span class="badge ${data.ai_analysis.sentiment === '看多' ? 'badge-green' : data.ai_analysis.sentiment === '看空' ? 'badge-red' : 'badge-yellow'}">${data.ai_analysis.sentiment}</span>
    </div>`;
    if (data.ai_analysis.summary) {
      html += `<div style="font-size:12px;margin-bottom:4px;">${data.ai_analysis.summary}</div>`;
    }
    if (data.ai_analysis.advice) {
      html += `<div style="font-size:12px;color:var(--blue);">💡 ${data.ai_analysis.advice}</div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

// 加载交易明细（含滑点）
async function loadTrades() {
  const data = await fetchJSON('/api/trades?limit=30');
  const tbody = document.getElementById('tradeBody');
  if (!data.records || data.records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:12px;">暂无交易记录</td></tr>';
    return;
  }
  const sideLabel = { 'LONG': '🟢 多', 'SHORT': '🔴 空' };
  const reasonMap = { 'open': '开仓', 'fast_sl': '快捞止损', 'fast_tp_lock': '快捞锁仓' };
  const entryModeLabel = { 'trend': '趋势', 'volatility_override': '波动覆盖', 'sideways': '横盘' };
  tbody.innerHTML = data.records.map(r => {
    const pnl = Number(r.realized_pnl || 0);
    const fee = Number(r.fee || 0);
    const slip = Number(r.slippage || 0);
    const net = Number(r.net_pnl || 0);
    const t = (r.time || '').slice(11, 19);
    const side = sideLabel[r.side] || r.side;
    const reason = reasonMap[r.reason] || r.reason;
    const entry = entryModeLabel[r.entry_mode] || '-';
    const entryColor = r.entry_mode === 'volatility_override' ? 'color:var(--orange);' : 'color:var(--muted);';
    return `<tr>
      <td style="color:var(--muted);font-size:12px;">${t}</td>
      <td><b>${r.symbol}</b></td>
      <td>${side}</td>
      <td style="font-size:11px;${entryColor}">${entry}</td>
      <td style="font-size:12px;color:var(--muted);">${reason}</td>
      <td class="${pnlClass(pnl)}">${pnl > 0 ? '+' : ''}${fmt(pnl)}</td>
      <td style="color:var(--muted);">${fmt(fee, 4)}</td>
      <td style="color:var(--orange);">${slip > 0 ? fmt(slip, 4) : '-'}</td>
      <td class="${pnlClass(net)}">${net > 0 ? '+' : ''}${fmt(net)}</td>
    </tr>`;
  }).join('');
}

// 加载资金费率
async function loadFunding() {
  const data = await fetchJSON('/api/funding');
  const tbody = document.getElementById('fundingBody');
  document.getElementById('totalFunding').textContent = fmt(data.total_payment || 0);
  if (!data.records || data.records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:12px;">暂无资金费率记录</td></tr>';
    return;
  }
  const sideDot = { 'LONG': '🟢', 'SHORT': '🔴' };
  tbody.innerHTML = data.records.map(r => {
    const t = (r.time || '').slice(11, 19);
    const payment = Number(r.payment || 0);
    const rate = Number(r.funding_rate || 0);
    return `<tr>
      <td style="color:var(--muted);font-size:12px;">${t}</td>
      <td><b>${r.symbol}</b></td>
      <td>${sideDot[r.side] || ''} ${r.side}</td>
      <td style="font-size:12px;">${(rate * 100).toFixed(4)}%</td>
      <td class="${pnlClass(payment)}">${payment > 0 ? '+' : ''}${fmt(payment, 4)}</td>
    </tr>`;
  }).join('');
}

// ==================== 事件绑定 ====================
document.getElementById('periodTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('#periodTabs .tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  loadPeriodStats(tab.dataset.period);
});

document.getElementById('logTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('#logTabs .tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  loadLogs(parseInt(tab.dataset.log));
});

// ==================== 轮询 ====================
function refreshAll() {
  updateTime();
  loadBalance();
  loadPosition();
  loadOverview();
  loadMarketAnalysis();
  loadTrades();
  loadFunding();
  loadPeriodStats(document.querySelector('#periodTabs .tab.active')?.dataset?.period || '1h');
  loadLogs(parseInt(document.querySelector('#logTabs .tab.active')?.dataset?.log || '200'));
}

// 每 5 秒刷新
refreshAll();
setInterval(refreshAll, 5000);
</script>
